<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zeni — Project Manager</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e0e; --surface: #181818; --surface2: #222;
    --border: #2e2e2e; --text: #f0ede6; --muted: #666;
    --accent: #d4af37; --green: #4ade80; --red: #f87171;
    --blue: #60a5fa; --purple: #c084fc; --orange: #fb923c;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; min-height: 100vh; padding: 2rem 1.5rem; max-width: 900px; margin: 0 auto; }

  /* HEADER */
  .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem; }
  h1 { font-family: 'Fraunces', serif; font-weight: 300; font-size: 2rem; color: var(--accent); }
  .subtitle { font-size: 10px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-top: 2px; }
  .header-meta { text-align: right; }
  .overall-progress { font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }
  .progress-bar-wrap { width: 200px; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.5s ease; }
  .progress-pct { font-size: 11px; color: var(--accent); margin-top: 4px; text-align: right; }

  /* LEGEND */
  .legend { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 1.5rem; padding: 10px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 10px; color: var(--muted); letter-spacing: 1px; }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; }

  /* PHASES */
  .phase { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 12px; overflow: hidden; transition: border-color 0.2s; }
  .phase.active { border-color: var(--phase-color); }
  .phase-header { display: flex; align-items: center; gap: 12px; padding: 14px 18px; cursor: pointer; user-select: none; }
  .phase-header:hover { background: var(--surface2); }
  .phase-badge { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; padding: 3px 9px; border-radius: 4px; background: color-mix(in srgb, var(--phase-color) 15%, transparent); color: var(--phase-color); white-space: nowrap; }
  .phase-title { font-size: 13px; color: var(--text); flex: 1; }
  .phase-time { font-size: 10px; color: var(--muted); white-space: nowrap; }
  .phase-count { font-size: 10px; color: var(--phase-color); margin-left: 8px; white-space: nowrap; }
  .phase-mini-bar { width: 60px; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .phase-mini-fill { height: 100%; background: var(--phase-color); border-radius: 2px; transition: width 0.4s; }
  .phase-chevron { color: var(--muted); font-size: 11px; transition: transform 0.2s; }
  .phase.open .phase-chevron { transform: rotate(90deg); }

  .phase-body { display: none; border-top: 1px solid var(--border); }
  .phase.open .phase-body { display: block; }

  /* TASKS */
  .task-list { padding: 12px 18px; display: flex; flex-direction: column; gap: 6px; }
  .task-item { display: flex; align-items: flex-start; gap: 10px; padding: 8px 10px; border-radius: 6px; cursor: pointer; transition: background 0.15s; }
  .task-item:hover { background: var(--surface2); }
  .task-item.done .task-text { color: var(--muted); text-decoration: line-through; }
  .task-item.done .task-check { background: var(--green); border-color: var(--green); }
  .task-item.done .task-check::after { opacity: 1; }

  .task-check { width: 16px; height: 16px; border: 1px solid var(--border); border-radius: 3px; flex-shrink: 0; margin-top: 1px; position: relative; transition: all 0.2s; }
  .task-check::after { content: '✓'; position: absolute; top: -1px; left: 2px; font-size: 11px; color: #000; opacity: 0; transition: opacity 0.2s; }
  .task-content { flex: 1; }
  .task-text { font-size: 11px; color: var(--text); line-height: 1.5; }
  .task-tag { display: inline-block; font-size: 9px; padding: 1px 6px; border-radius: 3px; background: var(--surface2); color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-left: 6px; vertical-align: middle; }

  .task-divider { height: 1px; background: var(--border); margin: 6px 0; }
  .task-section-label { font-size: 9px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; padding: 4px 0 2px 0; }

  /* STATS BAR */
  .stats-bar { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin-bottom: 1.5rem; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; }
  .stat-label { font-size: 9px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 6px; }
  .stat-value { font-family: 'Fraunces', serif; font-size: 1.6rem; font-weight: 600; color: var(--accent); }
  .stat-sub { font-size: 10px; color: var(--muted); margin-top: 2px; }

  /* FOOTER */
  .footer { margin-top: 2rem; padding-top: 1rem; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; }
  .footer-brand { font-size: 10px; color: var(--muted); letter-spacing: 1px; }
  .footer-brand span { color: var(--accent); }
  .reset-btn { font-size: 10px; color: var(--muted); background: none; border: 1px solid var(--border); border-radius: 4px; padding: 4px 10px; cursor: pointer; font-family: 'DM Mono', monospace; letter-spacing: 1px; text-transform: uppercase; }
  .reset-btn:hover { border-color: var(--red); color: var(--red); }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>Zeni</h1>
    <div class="subtitle">Project Manager · by Rixen Corporation</div>
  </div>
  <div class="header-meta">
    <div class="overall-progress">Progreso total</div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="globalFill" style="width:0%"></div>
    </div>
    <div class="progress-pct" id="globalPct">0%</div>
  </div>
</div>

<div class="stats-bar">
  <div class="stat-card">
    <div class="stat-label">Completadas</div>
    <div class="stat-value" id="statDone">0</div>
    <div class="stat-sub">tareas</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Pendientes</div>
    <div class="stat-value" id="statPending">0</div>
    <div class="stat-sub">tareas</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Fase activa</div>
    <div class="stat-value" id="statPhase" style="font-size:1rem; margin-top:4px;">—</div>
    <div class="stat-sub" id="statPhaseSub"></div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Inicio</div>
    <div class="stat-value" style="font-size:1rem; margin-top:4px;">Mayo</div>
    <div class="stat-sub">2026</div>
  </div>
</div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#60a5fa"></div> Definición</div>
  <div class="legend-item"><div class="legend-dot" style="background:#4ade80"></div> Técnico</div>
  <div class="legend-item"><div class="legend-dot" style="background:#d4af37"></div> Infraestructura</div>
  <div class="legend-item"><div class="legend-dot" style="background:#f87171"></div> Legal / Seguridad</div>
  <div class="legend-item"><div class="legend-dot" style="background:#c084fc"></div> Marca</div>
  <div class="legend-item"><div class="legend-dot" style="background:#fb923c"></div> Marketing</div>
  <div class="legend-item"><div class="legend-dot" style="background:#34d399"></div> Lanzamiento</div>
</div>

<div id="phases"></div>

<div class="footer">
  <div class="footer-brand">Zeni · <span>by Rixen Corporation</span> · 2026</div>
  <button class="reset-btn" onclick="resetAll()">Resetear progreso</button>
</div>

<script>
const PHASES = [
  {
    id: 'p0', label: 'FASE 0', name: 'Definición', color: '#60a5fa', time: 'Semana 1',
    tasks: [
      { id: 't01', text: 'Nombre de trabajo definido: Zeni', done: true },
      { id: 't02', text: 'Modelo de negocio definido (freemium)', done: true },
      { id: 't03', text: 'Target de usuario definido (LATAM, 25-45 años)', done: true },
      { id: 't04', text: 'Diferenciador claro vs competencia', done: true },
      { id: 't05', text: 'Registrar dominio (.app o .com)', tag: '~$12/año' },
      { id: 't06', text: 'Nombre definitivo cerrado', tag: 'árabe / inventado' },
    ]
  },
  {
    id: 'p1', label: 'FASE 1', name: 'Técnico — PWA', color: '#4ade80', time: 'Semanas 1–2',
    tasks: [
      { id: 't11', text: 'Auditar y ajustar UX del HTML actual (v4)', done: true },
      { id: 't12', text: 'Agregar manifest.json (ícono, colores, nombre)', done: true },
      { id: 't13', text: 'Crear service-worker.js (funciona offline)' },
      { id: 't14', text: 'Probar instalación en iPhone (Safari)', done: true },
      { id: 't15', text: 'Probar instalación en Android (Chrome)' },
      { id: 't16', text: 'Diseñar ícono de app 1024x1024px', tag: 'Midjourney' },
    ]
  },
  {
    id: 'p2', label: 'FASE 2', name: 'Infraestructura', color: '#d4af37', time: 'Semanas 2–3',
    tasks: [
      { id: 't21', text: 'Crear cuenta en Supabase (base de datos + auth)', tag: 'gratis', done: true },
      { id: 't22', text: 'Crear cuenta en Vercel (hosting) + deploy inicial', tag: 'gratis', done: true },
      { id: 't23', text: 'Conectar credenciales Supabase al v5 y redesplegar' },
      { id: 't24', text: 'Pantalla de registro con email' },
      { id: 't25', text: 'Login social (Google, Apple)', tag: 'más conversión' },
      { id: 't26', text: 'Recuperar contraseña' },
      { id: 't27', text: 'Sistema de gastos compartidos por categoría', tag: 'feature estrella' },
      { id: 't28', text: 'Escaneo de facturas (foto o email)', tag: 'feature estrella' },
      { id: 't29', text: 'Configurar Stripe para pagos futuros', tag: 'cuando aplique' },
      { id: 't2a', text: 'Crear Gmail del proyecto (hola.zeni@gmail.com)', tag: 'pendiente' },
      { id: 't2b', text: 'Configurar SendGrid o Postmark (correos transaccionales: confirmación, recuperar pass)', tag: 'Supabase' },
    ]
  },
  {
    id: 'p3', label: 'FASE 3', name: 'Legal y Seguridad', color: '#f87171', time: 'Semanas 3–4',
    tasks: [
      { id: 't31', text: 'Redactar Política de Privacidad', tag: 'Claude' },
      { id: 't32', text: 'Redactar Términos y Condiciones', tag: 'Claude' },
      { id: 't33', text: 'Banner de cookies y consentimiento' },
      { id: 't34', text: 'HTTPS forzado (automático en Vercel)', done: true },
      { id: 't35', text: 'Row Level Security en Supabase (cada usuario solo ve sus datos)' },
      { id: 't36', text: 'Rate limiting en login (anti fuerza bruta)' },
      { id: 't37', text: 'Backups automáticos diarios (Supabase)' },
      { id: 't38', text: 'Revisar cumplimiento GDPR si hay usuarios europeos' },
    ]
  },
  {
    id: 'p4', label: 'FASE 4', name: 'Marca e Identidad', color: '#c084fc', time: 'Semanas 2–4',
    tasks: [
      { id: 't41', text: 'Cerrar nombre definitivo', tag: 'árabe / Zen / inventado' },
      { id: 't42', text: 'Diseñar logo (versiones app, horizontal, solo ícono)', tag: 'Midjourney' },
      { id: 't43', text: 'Definir paleta de colores oficial y tipografía' },
      { id: 't44', text: 'Crear brand kit en Canva (plantillas posts/stories)', tag: 'Canva AI' },
      { id: 't45', text: 'Construir landing page web', tag: 'Claude' },
      { id: 't46', text: 'SEO básico: meta tags, Open Graph, palabras clave' },
      { id: 't47', text: 'Lista de espera / waitlist en landing page' },
    ]
  },
  {
    id: 'p5', label: 'FASE 5', name: 'Marketing', color: '#fb923c', time: 'Mes 2',
    tasks: [
      { id: 't51', text: 'Crear perfiles en Instagram y TikTok' },
      { id: 't52', text: 'Calendario de contenido (mín. 3 posts/semana)', tag: 'Claude' },
      { id: 't53', text: 'Primeros 12 posts diseñados y listos', tag: 'Canva AI' },
      { id: 't54', text: 'Primer Reel/video con IA', tag: 'CapCut AI / HeyGen' },
      { id: 't55', text: 'Instalar Meta Pixel en landing page' },
      { id: 't56', text: 'Crear cuenta Business Manager en Meta' },
      { id: 't57', text: 'Primer test de anuncio en Meta ($20-50)', tag: 'validar mensaje' },
      { id: 't58', text: 'Definir audiencias: 25-45, finanzas, LATAM' },
      { id: 't59', text: 'Configurar Flodesk: lista de espera + secuencia de bienvenida', tag: 'Flodesk · email marketing' },
      { id: 't5a', text: 'Conectar formulario de waitlist (landing) → Flodesk → secuencia automática' },
    ]
  },
  {
    id: 'p6', label: 'FASE 6', name: 'Lanzamiento', color: '#34d399', time: 'Mes 2–3',
    tasks: [
      { id: 't61', text: 'Beta cerrada: 10-20 usuarios de confianza' },
      { id: 't62', text: 'Crear encuesta de feedback (Google Forms)', tag: 'Claude' },
      { id: 't63', text: 'Sesión de feedback con beta users' },
      { id: 't64', text: 'Iterar app según feedback recibido' },
      { id: 't65', text: 'Post de lanzamiento en redes' },
      { id: 't66', text: 'Publicar en Product Hunt', tag: 'comunidad tech' },
      { id: 't67', text: 'Activar Meta Ads con presupuesto real' },
      { id: 't68', text: 'Email a lista de espera' },
      { id: 't69', text: 'Medir: registros, retención 7d, conversión premium' },
    ]
  }
];

const STORAGE_KEY = 'zeni_pm_state';

function loadState() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { return {}; }
}

function saveState(state) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function toggleTask(phaseId, taskId) {
  const state = loadState();
  if (!state[phaseId]) state[phaseId] = {};
  state[phaseId][taskId] = !state[phaseId][taskId];
  saveState(state);
  render();
}

function togglePhase(phaseId) {
  const el = document.getElementById('phase_' + phaseId);
  el.classList.toggle('open');
}

function resetAll() {
  if (confirm('¿Resetear todo el progreso? Esta acción no se puede deshacer.')) {
    localStorage.removeItem(STORAGE_KEY);
    render();
  }
}

function render() {
  const state = loadState();
  const container = document.getElementById('phases');
  let totalTasks = 0, totalDone = 0;

  container.innerHTML = PHASES.map(phase => {
    const pState = state[phase.id] || {};
    const doneTasks = phase.tasks.filter(t => t.done || pState[t.id]).length;
    const total = phase.tasks.length;
    totalTasks += total;
    totalDone += doneTasks;
    const pct = total > 0 ? Math.round(doneTasks / total * 100) : 0;

    const taskHTML = phase.tasks.map(task => {
      const isDone = task.done || pState[task.id];
      return `
        <div class="task-item ${isDone ? 'done' : ''}" onclick="toggleTask('${phase.id}','${task.id}')">
          <div class="task-check"></div>
          <div class="task-content">
            <div class="task-text">${task.text}${task.tag ? `<span class="task-tag">${task.tag}</span>` : ''}</div>
          </div>
        </div>`;
    }).join('');

    const wasOpen = document.getElementById('phase_' + phase.id)?.classList.contains('open');

    return `
      <div class="phase ${pct > 0 ? 'active' : ''} ${wasOpen ? 'open' : ''}" id="phase_${phase.id}" style="--phase-color:${phase.color}">
        <div class="phase-header" onclick="togglePhase('${phase.id}')">
          <div class="phase-badge">${phase.label}</div>
          <div class="phase-title">${phase.name}</div>
          <div class="phase-mini-bar"><div class="phase-mini-fill" style="width:${pct}%"></div></div>
          <div class="phase-count">${doneTasks}/${total}</div>
          <div class="phase-time">${phase.time}</div>
          <div class="phase-chevron">▶</div>
        </div>
        <div class="phase-body">
          <div class="task-list">${taskHTML}</div>
        </div>
      </div>`;
  }).join('');

  // Update stats
  const gPct = totalTasks > 0 ? Math.round(totalDone / totalTasks * 100) : 0;
  document.getElementById('globalFill').style.width = gPct + '%';
  document.getElementById('globalPct').textContent = gPct + '%';
  document.getElementById('statDone').textContent = totalDone;
  document.getElementById('statPending').textContent = totalTasks - totalDone;

  // Active phase
  const activePhase = PHASES.find(p => {
    const pState = state[p.id] || {};
    const done = p.tasks.filter(t => t.done || pState[t.id]).length;
    return done > 0 && done < p.tasks.length;
  }) || PHASES.find(p => {
    const pState = state[p.id] || {};
    return p.tasks.filter(t => t.done || pState[t.id]).length === 0;
  });
  if (activePhase) {
    document.getElementById('statPhase').textContent = activePhase.label;
    document.getElementById('statPhaseSub').textContent = activePhase.name;
  }
}

// Init — open first phase by default
render();
const firstPhase = document.getElementById('phase_p0');
if (firstPhase && !firstPhase.classList.contains('open')) firstPhase.classList.add('open');
</script>
</body>
</html>
